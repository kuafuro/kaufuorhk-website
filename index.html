<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kuafuor HK｜企業流程自動化 Enterprise Process Automation</title>
<meta name="description" content="Kuafuor HK — 幫香港企業做流程自動化：客服自動化、自動報表、自動審批流程。Motion Lab AI 運動分析係其中一個自動化實例。Process automation for Hong Kong businesses — customer service, reporting and approval workflows.">
<meta name="theme-color" content="#f3f2f2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lora:wght@400;600&family=Noto+Serif+TC:wght@400;600;700&display=swap">
<style>
  /* ═══════════ Classical — 書卷編輯風（紅／黑／白，紅色只做描邊） ═══════════ */
  :root{
    color-scheme: light;
    --color-bg:#f3f2f2; --color-surface:#eae9e9; --color-text:#201f1d;
    --color-divider:color-mix(in srgb, #201f1d 16%, transparent);

    /* Accent — 紅 */
    --color-accent:#a83228;
    --color-accent-100:#fdeeec; --color-accent-200:#f8d8d4; --color-accent-300:#efb4ad;
    --color-accent-400:#dd8177; --color-accent-500:#c25349; --color-accent-600:#8a281f;
    --color-accent-700:#6f1e16; --color-accent-800:#54160f; --color-accent-900:#38100b;

    /* Neutrals */
    --color-neutral-100:#f8f4f4; --color-neutral-200:#eae7e7; --color-neutral-300:#d7d3d3;
    --color-neutral-400:#bab6b6; --color-neutral-500:#9b9797; --color-neutral-600:#7d7979;
    --color-neutral-700:#605d5d; --color-neutral-800:#444141; --color-neutral-900:#2d2b2b;

    --font-heading:"Cormorant Garamond","Noto Serif TC",serif;
    --font-body:"Lora","Noto Serif TC",serif;
    --radius-md:4px;
    --shadow-lg:0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);
  }
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--color-bg); color:var(--color-text);
    font-family:var(--font-body); font-size:15px; line-height:1.55; font-weight:400;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3,h4{font-family:var(--font-heading); font-weight:600; line-height:1.12; letter-spacing:-0.015em; margin:0}
  p{margin:0}
  img{display:block; max-width:100%}
  a{color:var(--color-accent); text-underline-offset:3px}
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--color-accent); outline-offset:2px}
  ::selection{background:color-mix(in srgb, var(--color-accent) 30%, transparent)}
  .tnum{font-feature-settings:'tnum'}
  .text-muted{color:color-mix(in srgb, var(--color-text) 55%, transparent)}

  .wrap{max-width:1200px; margin:0 auto; padding:0 48px}

  /* ── 按鈕（描邊，非填色；紅色只做邊框＋文字） ── */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; text-decoration:none; font-family:var(--font-heading); font-weight:600;
    font-size:14px; line-height:1.2; color:var(--color-text);
    background:transparent; border:1px solid transparent; padding:11px 22px; border-radius:var(--radius-md);
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .btn svg{display:block}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn-primary{color:var(--color-accent); border-color:var(--color-accent)}
  .btn-primary:hover{background:color-mix(in srgb, var(--color-accent) 12%, transparent)}
  .btn-primary:active{background:color-mix(in srgb, var(--color-accent) 22%, transparent)}
  .btn-secondary{border-color:var(--color-divider)}
  .btn-secondary:hover{background:color-mix(in srgb, var(--color-text) 7%, transparent)}
  .btn-block{width:100%}

  /* ── Nav（sticky，底部髮絲線） ── */
  header.site{position:sticky; top:0; z-index:1000; background:var(--color-bg); border-bottom:1px solid var(--color-divider)}
  nav.bar{display:flex; align-items:center; gap:26px; padding:20px 0}
  .logo{
    font-family:var(--font-heading); font-weight:600; font-size:21px; letter-spacing:0.1em;
    text-transform:uppercase; margin-right:auto; text-decoration:none; color:var(--color-text);
  }
  .nav-links{list-style:none; display:flex; align-items:center; gap:26px; margin:0; padding:0}
  .nav-links a{font-size:13.5px; color:var(--color-text); text-decoration:none; transition:color .15s ease}
  .nav-links a:hover{color:var(--color-accent)}
  .nav-links a.account{border:1px solid var(--color-accent); color:var(--color-accent); font-family:var(--font-heading); font-weight:600; padding:8px 16px; border-radius:var(--radius-md)}
  .nav-links a.account:hover{background:color-mix(in srgb, var(--color-accent) 12%, transparent); color:var(--color-accent)}
  .lang{display:flex; border:1px solid var(--color-divider); border-radius:var(--radius-md); overflow:hidden; flex:none}
  .lang button{padding:5px 11px; border:none; background:transparent; color:var(--color-text); font-family:var(--font-body); font-size:12px; cursor:pointer; min-height:30px}
  .lang button.on{background:var(--color-accent); color:#fff}   /* 唯一填色例外 */
  #hamburger{
    display:inline-flex; align-items:center; justify-content:center;
    width:40px; height:40px; flex:none; cursor:pointer;
    border:1px solid var(--color-divider); border-radius:var(--radius-md);
    background:transparent; color:var(--color-text);
  }
  #hamburger:hover{background:color-mix(in srgb, var(--color-text) 7%, transparent); color:var(--color-accent)}
  #mobileMenu{
    display:none; position:fixed; top:70px; left:0; right:0; z-index:999;
    background:var(--color-bg); border-bottom:1px solid var(--color-divider); box-shadow:var(--shadow-lg);
  }
  #mobileMenu a{
    display:flex; align-items:center; min-height:50px; padding:0 24px;
    text-decoration:none; color:var(--color-text); font-family:var(--font-heading); font-weight:600; font-size:16px;
    border-top:1px solid var(--color-divider);
  }
  #mobileMenu a:hover{background:color-mix(in srgb, var(--color-text) 5%, transparent); color:var(--color-accent)}
  #mobileMenu.open{display:block}
  @media (min-width:841px){
    /* 桌面：漢堡＝Tree 2 下拉面板（貼齊右邊），Tree 1 項目唔重複 */
    #mobileMenu{
      left:auto; right:max(48px, calc((100% - 1200px)/2 + 48px)); width:280px;
      border:1px solid var(--color-divider); border-radius:0 0 6px 6px; overflow:hidden;
    }
    #mobileMenu a:first-child{border-top:none}
    #mobileMenu .m-only{display:none}
  }

  /* ── 每個大段落用髮絲線分隔 ── */
  section{border-top:1px solid var(--color-divider); scroll-margin-top:76px}
  header.site + section{border-top:none}

  /* ── Hero ── */
  .hero{display:grid; grid-template-columns:1.05fr 0.95fr; gap:56px; padding:72px 0 64px; align-items:center}
  .kicker{font-size:12px; letter-spacing:0.24em; text-transform:uppercase; color:var(--color-accent); font-feature-settings:'tnum'}
  .hero h1{font-size:56px; line-height:1.1; margin:14px 0 18px}
  .hero .lead{font-size:16px; line-height:1.8; text-align:justify; color:var(--color-neutral-700); max-width:52ch; margin:0 0 28px}
  .hero .cta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
  figure.hero-fig{margin:0}
  figcaption{font-size:11px; margin-top:6px; color:color-mix(in srgb, var(--color-text) 55%, transparent); font-feature-settings:'tnum'}

  /* ── Plate（相片框：6px surface 邊 + 1px 髮絲線），內含預留位 ── */
  .plate{box-sizing:border-box; border:6px solid var(--color-surface); outline:1px solid var(--color-divider); background:var(--color-surface); overflow:hidden; position:relative}
  .plate .slot{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    color:color-mix(in srgb, var(--color-accent) 42%, var(--color-surface));
    background:repeating-linear-gradient(135deg, transparent 0 13px, color-mix(in srgb, var(--color-accent) 5%, transparent) 13px 14px);
  }
  .plate .slot .slot-label{font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:color-mix(in srgb, var(--color-text) 42%, transparent)}
  .plate img{width:100%; height:100%; object-fit:cover; object-position:center; display:block}

  /* ── 雙路分流（兩欄，中間豎髮絲線） ── */
  .dual{display:grid; grid-template-columns:1.5fr 1fr}
  .dual > a{
    display:block; text-decoration:none; color:var(--color-text); padding:40px 48px 40px 0;
  }
  .dual > a + a{padding:40px 0 40px 48px; border-left:1px solid var(--color-divider)}
  .dual .path-ico{color:var(--color-accent)}
  .dual .ptag{display:block; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--color-accent); margin:0 0 2px; font-feature-settings:'tnum'}
  .dual .ptag.ex{color:var(--color-neutral-500)}
  .dual h3{font-size:26px; margin:12px 0 8px}
  .dual p{font-size:14px; line-height:1.75; text-align:justify; color:var(--color-neutral-700); margin:0 0 16px}
  .dual .go{font-size:14px; color:var(--color-accent); border-bottom:1px solid var(--color-accent); padding-bottom:2px}
  .dual > a:hover .go{border-bottom-color:var(--color-accent-600); color:var(--color-accent-600)}

  /* ── Services ── */
  .sec-pad{padding:56px 0}
  .sec-head{display:flex; align-items:baseline; gap:20px; margin-bottom:36px; flex-wrap:wrap}
  .sec-head .kicker{margin:0}
  .sec-head h2{font-size:34px; margin:0}
  .sec-head .sub{font-size:14px; margin:0 0 0 auto; color:color-mix(in srgb, var(--color-text) 55%, transparent)}
  .svc-grid{display:grid; grid-template-columns:1fr 1fr 1fr}
  .svc{padding:0 32px; border-left:1px solid var(--color-divider)}
  .svc .no{font-family:var(--font-heading); font-size:30px; color:var(--color-accent); font-feature-settings:'tnum'}
  .svc h3{font-size:22px; margin:8px 0 12px}
  .svc-list{display:flex; flex-direction:column; gap:9px}
  .svc-list .it,.ml-list .it{display:flex; gap:10px; align-items:flex-start; font-size:14px; color:var(--color-neutral-700)}
  .svc-list .chk,.ml-list .chk{color:var(--color-accent); flex:none; margin-top:2px}
  .svc-line{display:none; font-size:13px; color:var(--color-neutral-600)}

  /* ── Motion Lab ── */
  .ml-sec{display:grid; grid-template-columns:0.9fr 1.1fr; gap:56px; align-items:center; padding:56px 0}
  .ml-sec .kicker,.ct-sec .kicker{margin-bottom:10px}
  .ml-sec h2{font-size:34px; margin:0 0 10px}
  .ml-sec .lead{font-size:15px; line-height:1.8; text-align:justify; color:var(--color-neutral-700); margin:0 0 20px}
  .ml-list{display:flex; flex-direction:column; gap:9px; margin-bottom:26px}
  .ml-sec .cta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
  .ml-note{font-size:13px; margin:18px 0 0; color:color-mix(in srgb, var(--color-text) 55%, transparent)}
  .ml-note a{color:inherit; text-decoration:underline; text-underline-offset:3px}
  .ml-note a:hover{color:var(--color-accent)}
  .ml-plate{height:360px}

  /* ── Data analysis ── */
  .da-sec{display:grid; grid-template-columns:1.1fr 0.9fr; gap:56px; align-items:center; padding:56px 0}
  .da-sec .kicker{margin-bottom:10px}
  .da-sec h2{font-size:34px; margin:0 0 10px}
  .da-sec .lead{font-size:15px; line-height:1.8; text-align:justify; color:var(--color-neutral-700); margin:0 0 20px}
  .da-sec .cta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
  .da-plate{min-height:360px; display:flex; align-items:center; justify-content:center; padding:32px; text-align:center}
  .finding{max-width:30ch}
  .finding .kicker{margin-bottom:10px}
  .finding-stat{font-family:var(--font-heading); font-size:58px; line-height:1; color:var(--color-accent); font-feature-settings:'tnum'; margin:0}
  .finding-stat small{display:block; font-family:var(--font-body); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--color-neutral-600); margin-top:10px}
  .finding-txt{font-size:14.5px; line-height:1.7; color:var(--color-text); margin:16px 0 12px}
  .finding-note{font-size:12px; line-height:1.6; color:var(--color-neutral-600); margin:0}

  /* ── Contact ── */
  .ct-sec{display:grid; grid-template-columns:1fr 1.2fr; gap:56px; padding:56px 0}
  .ct-sec h2{font-size:34px; margin:0 0 10px}
  .ct-sec .lead{font-size:15px; line-height:1.8; color:var(--color-neutral-700); margin:0 0 22px; max-width:38ch}
  .ct-mail{display:flex; align-items:center; gap:10px; font-size:14px; color:var(--color-neutral-700)}
  .ct-mail .m-ico{color:var(--color-accent)}
  form.contact{display:flex; flex-direction:column; gap:16px}
  .field > span{display:block; font-size:12px; margin-bottom:5px; color:color-mix(in srgb, var(--color-text) 70%, transparent)}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .input{
    width:100%; min-height:44px; padding:10px 12px; font:inherit; font-size:14px;
    color:var(--color-text); caret-color:var(--color-accent); background:transparent;
    border:1px solid var(--color-divider); border-radius:var(--radius-md); font-family:var(--font-body);
  }
  select.input{min-height:44px}
  .input:hover{border-color:color-mix(in srgb, var(--color-text) 45%, transparent)}
  .input:focus-visible{border-color:var(--color-accent); outline:2px solid var(--color-accent); outline-offset:0}
  textarea.input{min-height:90px; resize:vertical}
  .phone-wrap{display:flex; gap:8px}
  .phone-wrap .cc{flex:0 0 72px; width:72px; color:var(--color-neutral-600)}
  .reveal-grp{display:none; border-left:2px solid var(--color-accent); padding-left:16px; flex-direction:column; gap:16px}
  .reveal-grp.show{display:flex; animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
  .hp{position:absolute; left:-9999px; opacity:0; height:0; overflow:hidden}
  #submitBtn{align-self:flex-start; padding:11px 26px}
  #submitBtn:disabled{cursor:wait}
  .spinner{
    display:inline-block; width:14px; height:14px; vertical-align:-2px; margin-right:8px;
    border:2px solid var(--color-accent); border-top-color:transparent; border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .formmsg{display:none; border-radius:var(--radius-md); padding:12px 16px; font-size:14px}
  .formmsg.ok{display:block; border:1px solid var(--color-accent); background:var(--color-accent-100); color:var(--color-accent-700)}
  .formmsg.err{display:block; border:1px solid var(--color-neutral-700); background:var(--color-neutral-100); color:var(--color-neutral-900)}

  /* ── Footer ── */
  footer{border-top:1px solid var(--color-divider); padding:20px 0 28px; display:flex; justify-content:space-between; gap:16px; font-size:12.5px; color:var(--color-neutral-600); font-feature-settings:'tnum'}
  footer a{color:var(--color-neutral-600); text-decoration:none}
  footer a:hover{color:var(--color-accent)}
  footer .foot-links{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  footer .foot-links .sep{color:var(--color-neutral-400)}

  /* ── 手機置底 CTA（拇指位，≤840px） ── */
  #stickyCta{
    display:none; position:fixed; left:0; right:0; bottom:0; z-index:998;
    background:var(--color-neutral-100); border-top:1px solid var(--color-divider);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    grid-template-columns:1fr 1fr; gap:10px;
  }
  #stickyCta .btn{min-height:44px}

  /* ── 滾動漸現（尊重 reduced-motion） ── */
  .fade{opacity:0; transform:translateY(18px); transition:opacity .5s ease, transform .5s ease}
  .fade.in{opacity:1; transform:none}
  html:not(.js-fade) .fade{opacity:1; transform:none}   /* JS 冇行起（module 載入失敗）→ 內容照樣顯示，唔會永遠隱形 */
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    .fade{opacity:1; transform:none; transition:none}
    .reveal-grp.show{animation:none}
  }

  /* ═══════════ 響應式 ═══════════ */
  @media (max-width:840px){
    .wrap{padding:0 20px}
    .nav-links{display:none}
    nav.bar{gap:12px; padding:16px 0}
    section{scroll-margin-top:64px}

    .hero{grid-template-columns:1fr; gap:24px; padding:40px 0 32px}
    .hero h1{font-size:34px}
    .hero .lead{font-size:14.5px; text-align:left}
    figure.hero-fig{order:2}
    .hero-fig .plate{aspect-ratio:3/2}

    .dual{grid-template-columns:1fr}
    .dual > a{padding:28px 0}
    .dual > a + a{padding:28px 0; border-left:none; border-top:1px solid var(--color-divider)}
    .dual h3{font-size:22px}

    .sec-pad,.ml-sec,.ct-sec{padding:32px 0}
    .sec-head{gap:8px; margin-bottom:16px}
    .sec-head h2{font-size:26px}
    .sec-head .sub{display:none}
    /* Services → 編號列（編號＋標題＋一句概述） */
    .svc-grid{grid-template-columns:1fr}
    .svc{display:flex; gap:14px; align-items:baseline; padding:12px 0; border-left:none; border-top:1px solid var(--color-divider)}
    .svc:first-child{padding-top:0; border-top:none}
    .svc .no{font-size:20px}
    .svc h3{font-size:18px; margin:0}
    .svc-list{display:none}
    .svc-line{display:block; margin-top:2px}

    .ml-sec{grid-template-columns:1fr; gap:24px}
    .ml-sec h2{font-size:26px}
    .ml-plate{height:220px; order:2}
    .ml-sec .cta-row{flex-direction:column; align-items:stretch}
    .ml-sec .cta-row .btn{width:100%; min-height:44px}

    .da-sec{grid-template-columns:1fr; gap:24px; padding:32px 0}
    .da-sec h2{font-size:26px}
    .da-plate{min-height:auto; order:2; padding:26px}
    .finding-stat{font-size:46px}
    .da-sec .cta-row{flex-direction:column; align-items:stretch}
    .da-sec .cta-row .btn{width:100%; min-height:44px}

    .ct-sec{grid-template-columns:1fr; gap:24px}
    .ct-sec h2{font-size:26px}
    .grid2{grid-template-columns:1fr}

    footer{flex-direction:column; gap:8px; text-align:center; align-items:center; padding-bottom:96px}
    footer .foot-links{justify-content:center}
    #stickyCta{display:grid}
  }
  @media (max-width:420px){
    .hero h1{font-size:30px}
  }
</style>
</head>
<body>

<header class="site">
  <div class="wrap">
    <nav class="bar">
      <a class="logo" href="#top">Kuafuor HK</a>
      <!-- Tree 1：核心（公司方向／聯絡／登入＋語言） -->
      <ul class="nav-links">
        <li><a href="#business" data-t="navBiz"></a></li>
        <li><a href="#contact" data-t="navContact"></a></li>
        <li><a class="account" id="navAccount" href="login/" data-t="navLogin"></a></li>
      </ul>
      <div class="lang" role="group" data-taria="ariaLang">
        <button id="langZh">廣</button>
        <button id="langEn">EN</button>
      </div>
      <button id="hamburger" data-taria="ariaMenu" aria-expanded="false" aria-controls="mobileMenu"></button>
    </nav>
  </div>
  <!-- Tree 2：其他功能（漢堡選單，桌面都有）；.m-only = 細屏先補返 Tree 1 -->
  <div id="mobileMenu">
    <a href="#data" data-t="navData"></a>
    <a href="#motionlab">Motion Lab</a>
    <a href="cantonese-subtitle/" data-t="navSub"></a>
    <a id="navCalcM" href="split-calculator/" style="display:none" data-t="navCalc"></a>
    <a class="m-only" href="#business" data-t="navBiz"></a>
    <a class="m-only" href="#contact" data-t="navContact"></a>
    <a class="m-only" id="navAccountM" href="login/" data-t="navLogin"></a>
  </div>
</header>

<!-- ═══ Hero ═══ -->
<section id="top">
  <div class="wrap hero">
    <div>
      <div class="kicker" data-t="kicker"></div>
      <h1 data-t="heroTitle"></h1>
      <p class="lead" data-t="heroSub"></p>
      <div class="cta-row">
        <a href="#business" class="btn btn-primary" data-t="ctaBiz"></a>
        <a href="#motionlab" class="btn btn-secondary" data-t="ctaMl"></a>
      </div>
    </div>
    <figure class="hero-fig">

    fServiceBiz:"Process automation enquiry", fServiceData:"Data analysis enquiry", fServiceMl:"Motion Lab session / booking", fServiceOther:"Other",
    fName:"Name", fEmail:"Email", fPhone:"Phone (HK)",
    fCompany:"Company name", fBudget:"Budget range", fBudgetPick:"— Please choose —", fBudgetTbd:"Not decided yet",
    fWhen:"Preferred date / time",
    fMsg:"Anything else? (optional)",
    fSend:"Send enquiry", fSending:"Sending…",
    fOk:"✔ Got it! We'll get back to you shortly.",
    fErrName:"Please tell us your name.", fErrService:"Please choose a service first.", fErrContact:"Leave at least an email or a phone number so we can reach you.",
    fErrSend:"Couldn't send — please try again later or email us directly.",
    fErrEmail:"That email doesn't look right — please double-check.",
    stickyEnquire:"Quick enquiry",
    ariaLang:"Language", ariaMenu:"More features", ariaCc:"Area code",
    navCalc:"Split calculator",
    footCopy:"© 2026 Kuafuorhk.com · All Rights Reserved",
  },
};

let lang = "zh";
try {
  lang = localStorage.getItem("kf-lang")
      || ((navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en");
} catch (e) {}
if (!I18N[lang]) lang = "zh";
const t = k => (I18N[lang] || I18N.zh)[k] ?? I18N.zh[k] ?? k;
const $ = s => document.querySelector(s);

function applyLang(){
  const sending = $("#submitBtn") && $("#submitBtn").disabled;
  document.querySelectorAll("[data-t]").forEach(el => {
    if (sending && el.closest("#submitBtn")) return;   // 送緊嘢：唔好剷走 spinner
    el.textContent = t(el.getAttribute("data-t"));
  });
  document.querySelectorAll("[data-taria]").forEach(el => {
    el.setAttribute("aria-label", t(el.getAttribute("data-taria")));
  });
  $("#langZh").classList.toggle("on", lang === "zh");
  $("#langEn").classList.toggle("on", lang === "en");
  document.documentElement.lang = lang === "zh" ? "zh-Hant-HK" : "en";
  renderAccount();
}
function setLang(l){
  lang = l;
  try { localStorage.setItem("kf-lang", l); } catch (e) {}
  const fm = $("#formMsg");
  if (fm) { fm.className = "formmsg"; fm.textContent = ""; }   // 唔留低舊語言嘅訊息
  applyLang();
}
$("#langZh").onclick = ()=>setLang("zh");
$("#langEn").onclick = ()=>setLang("en");

/* ════════════ 漢堡選單（Tree 2） ════════════ */
const ICON_MENU = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>';
const ICON_X = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
const menu = $("#mobileMenu"), burger = $("#hamburger");
burger.innerHTML = ICON_MENU;
burger.onclick = (e)=>{
  e.stopPropagation();   // 唔好俾下面「撳出面自動閂」嘅 document listener 收到（swap innerHTML 會令 e.target 脫離 DOM）
  const open = !menu.classList.contains("open");
  menu.classList.toggle("open", open);
  burger.setAttribute("aria-expanded", String(open));
  burger.innerHTML = open ? ICON_X : ICON_MENU;
};
function closeMenu(){
  menu.classList.remove("open");
  burger.innerHTML = ICON_MENU;
  burger.setAttribute("aria-expanded", "false");
}
menu.addEventListener("click", e=>{
  if(e.target.closest("a")) closeMenu();
});
// 撳選單以外任何地方（包括 Tree 1 連結）→ 自動閂
document.addEventListener("click", e=>{
  if(menu.classList.contains("open") && !e.target.closest("#mobileMenu, #hamburger, .lang")) closeMenu();
});
document.addEventListener("keydown", e=>{
  if(e.key === "Escape" && menu.classList.contains("open")){ closeMenu(); burger.focus(); }
});

/* ════════════ 滾動漸現 ════════════ */
const io = new IntersectionObserver(entries=>{
  entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
}, { threshold: .15 });
document.querySelectorAll(".fade").forEach(el=>io.observe(el));
// 安全網：萬一 IntersectionObserver 冇 fire（極快捲動／舊瀏覽器），2 秒後強制顯示，確保內容永遠見到
setTimeout(()=>document.querySelectorAll(".fade:not(.in)").forEach(el=>el.classList.add("in")), 2000);

/* ════════════ 漸進式表單 ════════════ */
const svcSel = $("#fService");
function revealGroups(){
  $("#grpBiz").classList.toggle("show", svcSel.value === "consulting" || svcSel.value === "data");
  $("#grpMl").classList.toggle("show", svcSel.value === "motionlab");
}
svcSel.addEventListener("change", revealGroups);

function formMsg(text, cls){
  const el = $("#formMsg");
  el.className = "formmsg " + cls;
  el.textContent = text;
}

$("#contactForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const btn = $("#submitBtn");
  if($("#fWebsite").value){ formMsg(t("fOk"), "ok"); e.target.reset(); revealGroups(); return; } // honeypot：假成功
  if(!svcSel.value){ formMsg(t("fErrService"), "err"); svcSel.focus(); return; }
  const name = $("#fName").value.trim();
  if(!name){ formMsg(t("fErrName"), "err"); $("#fName").focus(); return; }
  const email = $("#fEmail").value.trim();
  let phone = $("#fPhone").value.trim().replace(/^\+?852[\s-]*/, "");   // 用戶自己打咗 +852 就唔好重複
  if(!email && !phone){ formMsg(t("fErrContact"), "err"); $("#fEmail").focus(); return; }
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ formMsg(t("fErrEmail"), "err"); $("#fEmail").focus(); return; }

  const row = {
    service: svcSel.value,
    name,
    email: email || null,
    phone: phone ? "+852 " + phone : null,
    company: (svcSel.value === "consulting" || svcSel.value === "data") ? ($("#fCompany").value.trim() || null) : null,
    budget: (svcSel.value === "consulting" || svcSel.value === "data") ? ($("#fBudget").value || null) : null,
    preferred_time: svcSel.value === "motionlab" ? ($("#fWhen").value || null) : null,
    message: $("#fMsg").value.trim() || null,
    lang,
  };

  btn.disabled = true;
  const label = btn.querySelector("span");
  label.innerHTML = '<span class="spinner"></span>' + t("fSending");
  try{
    const resp = await fetch(SB_URL + "/rest/v1/contact_requests", {
      method: "POST",
      headers: { apikey: SB_KEY, "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(row),
      signal: AbortSignal.timeout(15000),
    });
    if(!resp.ok) throw new Error("HTTP " + resp.status);
    formMsg(t("fOk"), "ok");
    e.target.reset();
    revealGroups();
  }catch(err){
    console.warn("enquiry failed", err);
    formMsg(t("fErrSend"), "err");
  }finally{
    btn.disabled = false;
    label.textContent = t("fSend");   // 用當前語言還原（send 期間可能切咗語言）
  }
});

/* ════════════ 帳戶狀態（同 /login/ 共用 session） ════════════ */
let userEmail = null, userRole = null, _sb = null;
function renderAccount(){
  const text = userEmail ? userEmail.split("@")[0] : t("navLogin");
  const a = $("#navAccount"), m = $("#navAccountM");
  if(a) a.textContent = text;
  if(m) m.textContent = text;
  // 計數機入口（Tree 2 漢堡入面）：只有教練/管理員登入咗先顯示（街客睇唔到）
  const canCalc = userRole === "coach" || userRole === "admin";
  const mc = $("#navCalcM");
  if(mc) mc.style.display = canCalc ? "flex" : "none";
}
async function refreshRole(session){
  userEmail = session?.user?.email || null;
  userRole = null;
  if(session?.user && _sb){
    try{
      const { data } = await _sb.from("profiles").select("role").eq("id", session.user.id).single();
      userRole = data?.role || "member";
    }catch(e){ userRole = "member"; }
  }
  renderAccount();
}
applyLang();
(async ()=>{
  try{
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
    _sb = createClient(SB_URL, SB_KEY);
    _sb.auth.onAuthStateChange((_ev, session)=>{ refreshRole(session); });
    await refreshRole((await _sb.auth.getSession()).data.session);
  }catch(e){ console.warn("account service unavailable", e); }
})();
</script>
