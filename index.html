<title>Kuafuor HK｜企業方案 × 運動分析 Business Solutions × Motion Lab</title>
<meta name="description" content="Kuafuor HK — 企業顧問及系統開發 · AI 運動姿態分析 Motion Lab。Consulting, development and AI-powered motion analysis in Hong Kong.">
<style>
  /* ===== 黑白主色 Monochrome design system ===== */
  :root{
    color-scheme: light dark;
    --bg:#fafafa; --card:#ffffff; --ink:#111111; --muted:#666666;
    --line:#e2e2e2; --line-strong:#111111;
    --btn:#111111; --btn-ink:#ffffff;
    --soft:#f0f0f0; --ok:#1e7d46; --ok-soft:#e6f4ec;
    --shadow:0 10px 30px rgba(0,0,0,.08);
    --shadow-lift:0 16px 40px rgba(0,0,0,.14);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e0e0e; --card:#1a1a1a; --ink:#f2f2f2; --muted:#9a9a9a;
      --line:#333333; --line-strong:#f2f2f2;
      --btn:#f2f2f2; --btn-ink:#111111;
      --soft:#242424; --ok:#5fd08d; --ok-soft:#1d3327;
      --shadow:0 10px 30px rgba(0,0,0,.5);
      --shadow-lift:0 16px 40px rgba(0,0,0,.65);
    }
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,"PingFang HK","Noto Sans TC","Segoe UI","Microsoft JhengHei",sans-serif;
    line-height:1.65; color:var(--ink); background:var(--bg);
    padding-bottom:env(safe-area-inset-bottom);
  }
  img{max-width:100%}
  section{scroll-margin-top:76px}

  /* ===== Nav ===== */
  header.site{
    position:fixed; top:0; width:100%; z-index:1000;
    background:var(--card); border-bottom:1px solid var(--line);
  }
  nav.bar{
    max-width:1100px; margin:0 auto; padding:12px 18px;
    display:flex; align-items:center; gap:14px;
  }
  .logo{font-size:1.15rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-right:auto; text-decoration:none; color:var(--ink)}
  .nav-links{list-style:none; display:flex; gap:4px; align-items:center}
  .nav-links a{
    display:block; padding:10px 12px; border-radius:10px;
    text-decoration:none; color:var(--ink); font-weight:600; font-size:.9rem;
  }
  .nav-links a:hover{background:var(--soft)}
  .nav-links a.account{border:1.5px solid var(--line-strong); font-weight:800}
  .lang{display:flex; border:1px solid var(--line-strong); border-radius:99px; overflow:hidden; flex:none}
  .lang button{padding:6px 12px; border:none; background:none; color:var(--ink); font-size:.78rem; font-weight:700; cursor:pointer; min-height:32px}
  .lang button.on{background:var(--btn); color:var(--btn-ink)}
  #hamburger{
    display:none; border:1px solid var(--line-strong); background:none; color:var(--ink);
    border-radius:10px; font-size:1.15rem; width:44px; height:44px; cursor:pointer; flex:none;
  }
  #mobileMenu{
    display:none; position:fixed; top:69px; left:0; right:0; z-index:999;
    background:var(--card); border-bottom:1px solid var(--line); box-shadow:var(--shadow);
  }
  #mobileMenu a{
    display:flex; align-items:center; min-height:48px; padding:0 22px;
    text-decoration:none; color:var(--ink); font-weight:700; border-top:1px solid var(--line);
  }
  #mobileMenu.open{display:block}
  @media (max-width:840px){
    .nav-links{display:none}
    #hamburger{display:block}
  }

  /* ===== Hero + 分流 ===== */
  .hero{
    position:relative; padding:150px 18px 70px; text-align:center; overflow:hidden; isolation:isolate;
  }
  .hero::before{
    content:""; position:absolute; inset:0; z-index:-1;
    background:linear-gradient(rgba(0,0,0,.66),rgba(0,0,0,.66)),
      url('https://images.unsplash.com/photo-1506318137071-a8bcbf6755dd?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') center/cover;
    filter:grayscale(1);
  }
  .hero h1{color:#fff; font-size:clamp(1.7rem,5vw,3rem); letter-spacing:1px; margin-bottom:10px}
  .hero p.sub{color:#ddd; font-size:clamp(.95rem,2.5vw,1.15rem); margin-bottom:34px}
  .split{
    max-width:860px; margin:0 auto;
    display:grid; grid-template-columns:1fr 1fr; gap:16px; text-align:left;
  }
  @media (max-width:640px){ .split{grid-template-columns:1fr} }
  .split a{
    display:block; background:var(--card); color:var(--ink); text-decoration:none;
    border:1px solid var(--line); border-radius:16px; padding:22px 20px;
    box-shadow:var(--shadow); transition:transform .22s ease, box-shadow .22s ease;
  }
  .split a:hover{transform:translateY(-4px); box-shadow:var(--shadow-lift)}
  .split .ico{font-size:1.7rem}
  .split h2{font-size:1.12rem; margin:8px 0 4px}
  .split p{font-size:.85rem; color:var(--muted)}
  .split .go{display:inline-block; margin-top:12px; font-weight:800; font-size:.88rem; border-bottom:2px solid var(--ink)}

  /* ===== Sections ===== */
  .container{max-width:1100px; margin:0 auto; padding:64px 18px}
  .kicker{font-size:.75rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); text-align:center}
  .section-title{text-align:center; font-size:clamp(1.4rem,3.5vw,2rem); margin:6px 0 8px}
  .section-sub{text-align:center; color:var(--muted); font-size:.92rem; max-width:640px; margin:0 auto 36px}
  .grid3{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px}
  .svc{
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:24px 22px;
    transition:transform .22s ease, box-shadow .22s ease;
  }
  .svc:hover{transform:translateY(-4px); box-shadow:var(--shadow-lift)}
  .svc .ico{font-size:1.5rem}
  .svc h3{margin:8px 0 10px; font-size:1.05rem}
  .svc ul{list-style:none}
  .svc li{
    font-size:.88rem; color:var(--muted); padding:5px 0 5px 26px; position:relative;
  }
  .svc li::before{content:"✅"; position:absolute; left:0; font-size:.8rem}
  .band{background:var(--card); border-top:1px solid var(--line); border-bottom:1px solid var(--line)}

  /* Motion Lab teaser */
  .ml{
    max-width:860px; margin:0 auto; display:grid; grid-template-columns:1.1fr .9fr; gap:26px; align-items:center;
  }
  @media (max-width:700px){ .ml{grid-template-columns:1fr} }
  .ml ul{list-style:none; margin:14px 0 20px}
  .ml li{font-size:.92rem; padding:6px 0 6px 28px; position:relative}
  .ml li::before{content:"🥊"; position:absolute; left:0; font-size:.85rem}
  .btn{
    display:inline-block; background:var(--btn); color:var(--btn-ink);
    padding:13px 28px; border:1.5px solid var(--btn); border-radius:12px;
    text-decoration:none; font-weight:800; font-size:.95rem; cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn.ghost{background:none; color:var(--ink); border-color:var(--line-strong)}
  .ml-visual{
    border:1px solid var(--line); border-radius:16px; background:var(--soft);
    aspect-ratio:4/3; display:flex; align-items:center; justify-content:center;
    font-size:3.4rem;
  }

  /* ===== Contact form ===== */
  form.contact{
    max-width:560px; margin:0 auto; background:var(--card);
    border:1px solid var(--line); border-radius:16px; padding:26px 22px;
  }
  label.f{display:block; font-size:.78rem; color:var(--muted); margin-bottom:14px}
  label.f > span{display:block; margin-bottom:5px; font-weight:600}
  input, select, textarea{
    width:100%; font-size:1rem; padding:12px; min-height:48px;
    border:1px solid var(--line); border-radius:10px;
    background:var(--bg); color:var(--ink); font-family:inherit;
  }
  textarea{min-height:96px; resize:vertical}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--line-strong)}
  .phone-wrap{display:flex; gap:8px}
  .phone-wrap .cc{flex:0 0 84px}
  .reveal-grp{
    display:none; border-left:3px solid var(--line-strong);
    padding-left:14px; margin-bottom:6px;
  }
  .reveal-grp.show{display:block; animation:fadeUp .35s ease}
  .hp{position:absolute; left:-9999px; opacity:0; height:0; overflow:hidden}
  #submitBtn{width:100%; margin-top:4px}
  #submitBtn:disabled{opacity:.6; cursor:wait}
  .spinner{
    display:inline-block; width:16px; height:16px; vertical-align:-3px; margin-right:8px;
    border:2px solid var(--btn-ink); border-top-color:transparent; border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .formmsg{display:none; margin-top:14px; border-radius:10px; padding:12px 14px; font-size:.88rem}
  .formmsg.ok{display:block; background:var(--ok-soft); color:var(--ok); font-weight:700}
  .formmsg.err{display:block; background:var(--btn); color:var(--btn-ink); font-weight:600}

  /* ===== Footer & sticky CTA ===== */
  footer{border-top:1px solid var(--line); text-align:center; padding:26px 18px 110px; color:var(--muted); font-size:.8rem}
  footer a{color:var(--muted)}
  #stickyCta{
    display:none; position:fixed; left:0; right:0; bottom:0; z-index:998;
    background:var(--card); border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    grid-template-columns:1fr 1fr; gap:10px;
  }
  #stickyCta a{
    display:flex; align-items:center; justify-content:center; min-height:48px;
    border-radius:12px; text-decoration:none; font-weight:800; font-size:.92rem;
  }
  #stickyCta .primary{background:var(--btn); color:var(--btn-ink)}
  #stickyCta .second{border:1.5px solid var(--line-strong); color:var(--ink)}
  @media (max-width:840px){ #stickyCta{display:grid} }
  @media (min-width:841px){ footer{padding-bottom:26px} }

  /* ===== 滾動漸現（尊重 reduced motion） ===== */
  .fade{opacity:0; transform:translateY(22px); transition:opacity .5s ease, transform .5s ease}
  .fade.in{opacity:1; transform:none}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    .fade{opacity:1; transform:none; transition:none}
    .split a, .svc, .btn{transition:none}
  }
</style>
</head>

let lang = "zh";
try {
  lang = localStorage.getItem("kf-lang")
      || ((navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en");
} catch (e) {}
if (!I18N[lang]) lang = "zh";
const t = k => (I18N[lang] || I18N.zh)[k] ?? I18N.zh[k] ?? k;
const $ = s => document.querySelector(s);

function applyLang(){
  const sending = $("#submitBtn") && $("#submitBtn").disabled;
  document.querySelectorAll("[data-t]").forEach(el => {
    if (sending && el.closest("#submitBtn")) return;   // 送緊嘢：唔好剷走 spinner
    el.textContent = t(el.getAttribute("data-t"));
  });
  document.documentElement.querySelectorAll("[data-taria]").forEach(el => {
    el.setAttribute("aria-label", t(el.getAttribute("data-taria")));
  });
  $("#langZh").classList.toggle("on", lang === "zh");
  $("#langEn").classList.toggle("on", lang === "en");
  document.documentElement.lang = lang === "zh" ? "zh-Hant-HK" : "en";
  renderAccount();
}
function setLang(l){
  lang = l;
  try { localStorage.setItem("kf-lang", l); } catch (e) {}
  const fm = $("#formMsg");
  if (fm) { fm.className = "formmsg"; fm.textContent = ""; }   // 唔留低舊語言嘅訊息
  applyLang();
}
$("#langZh").onclick = ()=>setLang("zh");
$("#langEn").onclick = ()=>setLang("en");

/* ================= 手機選單 ================= */
const menu = $("#mobileMenu"), burger = $("#hamburger");
burger.onclick = ()=>{
  const open = !menu.classList.contains("open");
  menu.classList.toggle("open", open);
  burger.setAttribute("aria-expanded", String(open));
  burger.textContent = open ? "✕" : "☰";
};
menu.addEventListener("click", e=>{
  if(e.target.tagName === "A"){ menu.classList.remove("open"); burger.textContent = "☰"; }
});

/* ================= 滾動漸現 ================= */
const io = new IntersectionObserver(entries=>{
  entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
}, { threshold: .15 });
document.querySelectorAll(".fade").forEach(el=>io.observe(el));

/* ================= 漸進式表單 ================= */
const svcSel = $("#fService");
function revealGroups(){
  $("#grpBiz").classList.toggle("show", svcSel.value === "consulting");
  $("#grpMl").classList.toggle("show", svcSel.value === "motionlab");
}
svcSel.addEventListener("change", revealGroups);

function formMsg(text, cls){
  const el = $("#formMsg");
  el.className = "formmsg " + cls;
  el.textContent = text;
}

$("#contactForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const btn = $("#submitBtn");
  if($("#fWebsite").value){ formMsg(t("fOk"), "ok"); e.target.reset(); revealGroups(); return; } // honeypot：假成功
  if(!svcSel.value){ formMsg(t("fErrService"), "err"); svcSel.focus(); return; }
  const name = $("#fName").value.trim();
  if(!name){ formMsg(t("fErrName"), "err"); $("#fName").focus(); return; }
  const email = $("#fEmail").value.trim();
  let phone = $("#fPhone").value.trim().replace(/^\+?852[\s-]*/, "");   // 用戶自己打咗 +852 就唔好重複
  if(!email && !phone){ formMsg(t("fErrContact"), "err"); $("#fEmail").focus(); return; }
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ formMsg(t("fErrEmail"), "err"); $("#fEmail").focus(); return; }

  const row = {
    service: svcSel.value,
    name,
    email: email || null,
    phone: phone ? "+852 " + phone : null,
    company: svcSel.value === "consulting" ? ($("#fCompany").value.trim() || null) : null,
    budget: svcSel.value === "consulting" ? ($("#fBudget").value || null) : null,
    preferred_time: svcSel.value === "motionlab" ? ($("#fWhen").value || null) : null,
    message: $("#fMsg").value.trim() || null,
    lang,
  };

  btn.disabled = true;
  const label = btn.querySelector("span");
  label.innerHTML = '<span class="spinner"></span>' + t("fSending");
  try{
    const resp = await fetch(SB_URL + "/rest/v1/contact_requests", {
      method: "POST",
      headers: { apikey: SB_KEY, "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(row),
      signal: AbortSignal.timeout(15000),
    });
    if(!resp.ok) throw new Error("HTTP " + resp.status);
    formMsg(t("fOk"), "ok");
    e.target.reset();
    revealGroups();
  }catch(err){
    console.warn("enquiry failed", err);
    formMsg(t("fErrSend"), "err");
  }finally{
    btn.disabled = false;
    label.textContent = t("fSend");   // 用當前語言還原（send 期間可能切咗語言）
  }
});

/* ================= 帳戶狀態（同 /login/ 共用 session） ================= */
let userEmail = null;
function renderAccount(){
  const text = userEmail ? "👤 " + userEmail.split("@")[0] : t("navLogin");
  const a = $("#navAccount"), m = $("#navAccountM");
  if(a) a.textContent = text;
  if(m) m.textContent = text;
}
applyLang();
(async ()=>{
  try{
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
    const sb = createClient(SB_URL, SB_KEY);
    sb.auth.onAuthStateChange((_ev, session)=>{ userEmail = session?.user?.email || null; renderAccount(); });
    userEmail = (await sb.auth.getSession()).data.session?.user?.email || null;
    renderAccount();
  }catch(e){ console.warn("account service unavailable", e); }
})();
</script>
