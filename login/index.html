<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 Login｜Kuafuor HK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lora:wght@400;600&family=Noto+Serif+TC:wght@400;600;700&display=swap">
<style>
  /* 書卷編輯風 — 沿用主頁 token（紅／黑／米白，淨淺色） */
  :root{
    color-scheme: light;
    --bg:#f3f2f2; --card:#f8f4f4; --ink:#201f1d; --muted:#605d5d;
    --line:#d7d3d3; --line-strong:#201f1d;
    --btn:#a83228; --btn-ink:#ffffff;
    --soft:#eae9e9; --err-bg:#6f1e16; --err-ink:#ffffff;
    --accent:#a83228;
  }
  /* 統一淺色識別：深色模式都用返同一套（同主頁一致，唔做 dark） */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#f3f2f2; --card:#f8f4f4; --ink:#201f1d; --muted:#605d5d;
      --line:#d7d3d3; --line-strong:#201f1d;
      --btn:#a83228; --btn-ink:#ffffff;
      --soft:#eae9e9; --err-bg:#6f1e16; --err-ink:#ffffff;
      --accent:#a83228;
    }
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Lora","Noto Serif TC",serif;
    background:var(--bg); color:var(--ink); line-height:1.6; padding:24px 14px 60px;
    display:flex; flex-direction:column; align-items:center; min-height:100vh;
  }
  h1,h2,h3,h4{font-family:"Cormorant Garamond","Noto Serif TC",serif; letter-spacing:-0.01em}
  .brand,.brand a{font-family:"Cormorant Garamond","Noto Serif TC",serif; font-weight:600; letter-spacing:.1em; border-bottom:none !important}
  /* 收窄圓角 → 4–6px（書卷風） */
  .card{border-radius:6px}
  .lang{border-radius:4px}
  .lang button.on{background:var(--accent); color:#fff}
  .tabs button,button.primary,button.ghost,label.f input,.row2 button,.user-row select{border-radius:4px}
  .steps li .n,.avatar{border-radius:50%}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  a{text-underline-offset:3px}
  .topbar{width:100%;max-width:430px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .brand{font-size:1.05rem;font-weight:800;letter-spacing:2px;text-transform:uppercase}
  .brand a{color:var(--ink);text-decoration:none;border-bottom:2px solid var(--ink)}
  .lang{display:flex;border:1px solid var(--line-strong);border-radius:99px;overflow:hidden}
  .lang button{
    padding:5px 14px;border:none;background:none;color:var(--ink);font-size:.8rem;cursor:pointer;font-weight:600;
  }
  .lang button.on{background:var(--btn);color:var(--btn-ink)}
  .card{
    width:100%; max-width:430px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:22px 18px; margin-bottom:14px;
  }
  h2{font-size:1.05rem;margin-bottom:6px}
  .hint{font-size:.82rem;color:var(--muted);margin-bottom:14px}
  /* 狀態橫條：話你知而家去到邊一步 */
  .status{
    font-size:.8rem;border:1px dashed var(--line-strong);border-radius:10px;
    padding:9px 12px;margin-bottom:14px;background:var(--soft);
  }
  .status b{font-weight:800}
  /* 步驟 */
  .steps{list-style:none;margin:0 0 14px;display:flex;flex-direction:column;gap:8px}
  .steps li{display:flex;gap:10px;align-items:flex-start;font-size:.84rem;color:var(--muted)}
  .steps li .n{
    flex:0 0 22px;height:22px;border-radius:50%;border:1.5px solid var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;margin-top:1px;
  }
  .steps li.now{color:var(--ink);font-weight:600}
  .steps li.now .n{background:var(--btn);color:var(--btn-ink);border-color:var(--btn)}
  .steps li.done{color:var(--ink)}
  .steps li.done .n{border-color:var(--ink)}
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tabs button{
    flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);
    background:none;color:var(--muted);font-size:.92rem;cursor:pointer;font-weight:700;
  }
  .tabs button.on{background:var(--btn);border-color:var(--btn);color:var(--btn-ink)}
  label.f{display:flex;flex-direction:column;gap:4px;font-size:.76rem;color:var(--muted);margin-bottom:10px}
  label.f input{
    font-size:1rem;padding:11px;border:1px solid var(--line);border-radius:10px;
    background:var(--bg);color:var(--ink);width:100%;
  }
  label.f input:focus{outline:2px solid var(--line-strong)}
  button.primary{
    width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--btn);background:var(--btn);
    color:var(--btn-ink);font-size:1rem;font-weight:800;cursor:pointer;margin-top:4px;
  }
  button.primary:disabled{opacity:.55}
  button.ghost{
    width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--line-strong);background:none;
    color:var(--ink);font-size:.9rem;font-weight:600;cursor:pointer;margin-top:8px;
  }
  .aux{font-size:.82rem;color:var(--muted);text-align:center;margin-top:14px}
  .aux a{color:var(--ink);cursor:pointer;text-decoration:underline;font-weight:600}
  .msg{font-size:.84rem;border-radius:10px;padding:11px 13px;margin-top:12px;display:none;line-height:1.55}
  .msg.err{background:var(--err-bg);color:var(--err-ink);display:block;font-weight:600}
  .msg.ok{background:var(--soft);color:var(--ink);display:block;border:1px solid var(--line-strong)}
  .msg.info{background:var(--soft);color:var(--ink);display:block}
  .bigmail{font-size:1.6rem;text-align:center;margin:6px 0}
  .mailaddr{text-align:center;font-weight:800;word-break:break-all;margin-bottom:10px}
  /* profile */
  .who{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--btn);color:var(--btn-ink);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem}
  .who .email{font-size:.85rem;color:var(--muted);word-break:break-all}
  .badge{display:inline-block;font-size:.74rem;padding:2px 10px;border-radius:99px;font-weight:700;border:1.5px solid var(--ink)}
  .badge.member{color:var(--muted);border-color:var(--muted)}
  .badge.student{color:var(--ink);background:var(--soft)}
  .badge.coach{background:var(--btn);color:var(--btn-ink);border-color:var(--btn)}
  .badge.admin{background:var(--btn);color:var(--btn-ink);border-color:var(--btn)}
  /* 訂閱 plan（課金）+ 修行 level（練返嚟）badges */
  .badge.holder{color:var(--muted);border-color:var(--muted);border-style:dashed}
  .badge.pro,.badge.max{background:#a83228;color:#fff;border-color:#a83228}
  .badge.lv{border-color:var(--line-strong);background:none;color:var(--ink)}
  .features{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
  .features h3{font-size:.78rem;color:var(--muted);margin-bottom:8px;letter-spacing:1px}
  .feat{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;font-size:.9rem;border-bottom:1px dashed var(--line)}
  .feat:last-child{border-bottom:none}
  .feat .need{font-size:.72rem;color:var(--muted)}
  .feat a{color:var(--ink);text-decoration:underline;font-weight:700;white-space:nowrap}
  .feat.locked{opacity:.75}
  .row2{display:flex;gap:8px;align-items:flex-end}
  .row2 label.f{flex:1;margin-bottom:0}
  .row2 button{width:auto;margin-top:0;padding:11px 16px}
  .user-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:9px 0;border-bottom:1px dashed var(--line);font-size:.85rem}
  .user-row:last-child{border-bottom:none}
  .user-row .em{flex:1;min-width:150px;word-break:break-all}
  .user-row select{padding:6px 8px;border-radius:8px;border:1px solid var(--line-strong);background:var(--bg);color:var(--ink)}
  .foot{font-size:.72rem;color:var(--muted);text-align:center;margin-top:10px;line-height:1.7}
  .foot a{color:var(--muted)}
  .spin{text-align:center;color:var(--muted);font-size:.85rem;padding:24px 0}
  .enq{padding:9px 0;border-bottom:1px dashed var(--line);font-size:.86rem}
  .enq:last-child{border-bottom:none}
  .enq .mu{color:var(--muted)}
  .enq .sm{font-size:.78rem;margin-top:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><a href="/">KUAFUOR HK</a></div>
  <div class="lang">
    <button id="langZh">廣東話</button>
    <button id="langEn">English</button>
  </div>
</div>

<div class="card" id="loading"><div class="spin" data-t="loading"></div></div>

<!-- 未登入 -->
<div class="card" id="authCard" style="display:none">
  <div class="status" id="statusBar"></div>

  <!-- view: login / signup -->
  <div id="viewAuth">
    <div class="tabs">
      <button id="tabLogin" class="on" data-t="tabLogin"></button>
      <button id="tabSignup" data-t="tabSignup"></button>
    </div>
    <ol class="steps" id="signupSteps" style="display:none">
      <li class="now"><span class="n">1</span><span data-t="step1"></span></li>
      <li><span class="n">2</span><span data-t="step2"></span></li>
      <li><span class="n">3</span><span data-t="step3"></span></li>
    </ol>
    <div id="signupName" style="display:none">
      <label class="f"><span data-t="nameLabel"></span><input type="text" id="name" autocomplete="name"></label>
    </div>
    <label class="f"><span data-t="emailLabel"></span><input type="email" id="email" autocomplete="email" placeholder="you@example.com"></label>
    <label class="f"><span data-t="passLabel"></span><input type="password" id="password" autocomplete="current-password"></label>
    <button class="primary" id="submitBtn"></button>
    <div class="aux"><a id="forgot" data-t="forgotLink"></a></div>
  </div>

  <!-- view: 確認電郵（第2步） -->
  <div id="viewCheckMail" style="display:none">
    <div class="bigmail">✉️</div>
    <h2 style="text-align:center" data-t="checkMailTitle"></h2>
    <div class="mailaddr" id="sentTo"></div>
    <ol class="steps">
      <li class="done"><span class="n">✓</span><span data-t="step1"></span></li>
      <li class="now"><span class="n">2</span><span data-t="checkMailStep2"></span></li>
      <li><span class="n">3</span><span data-t="step3"></span></li>
    </ol>
    <p class="hint" data-t="checkMailSpam"></p>
    <button class="ghost" id="resendBtn" data-t="resendBtn"></button>
    <button class="ghost" id="backToLogin1" data-t="backToLogin"></button>
  </div>

  <!-- view: 唔記得密碼 -->
  <div id="viewForgot" style="display:none">
    <h2 data-t="forgotTitle"></h2>
    <ol class="steps">
      <li class="now"><span class="n">1</span><span data-t="forgotStep1"></span></li>
      <li><span class="n">2</span><span data-t="forgotStep2"></span></li>
      <li><span class="n">3</span><span data-t="forgotStep3"></span></li>
    </ol>
    <label class="f"><span data-t="emailLabel"></span><input type="email" id="forgotEmail" autocomplete="email" placeholder="you@example.com"></label>
    <button class="primary" id="sendResetBtn" data-t="sendResetBtn"></button>
    <button class="ghost" id="backToLogin2" data-t="backToLogin"></button>
  </div>

  <!-- view: 設定新密碼（由重設連結入嚟） -->
  <div id="viewRecovery" style="display:none">
    <h2 data-t="recoveryTitle"></h2>
    <ol class="steps">
      <li class="done"><span class="n">✓</span><span data-t="forgotStep1"></span></li>
      <li class="done"><span class="n">✓</span><span data-t="forgotStep2"></span></li>
      <li class="now"><span class="n">3</span><span data-t="forgotStep3"></span></li>
    </ol>
    <label class="f"><span data-t="newPassLabel"></span><input type="password" id="newPassword" autocomplete="new-password"></label>
    <button class="primary" id="setPassBtn" data-t="setPassBtn"></button>
    <button class="ghost" id="backToLogin3" data-t="backToLogin"></button>
  </div>

  <div class="msg" id="authMsg"></div>
</div>

<!-- 已登入 -->
<div class="card" id="profileCard" style="display:none">
  <div class="status" id="statusIn"></div>
  <div class="who">
    <div class="avatar" id="avatar">?</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <b id="pName"></b><span class="badge member" id="pRole">…</span><span class="badge holder" id="pPlan" style="display:none"></span><span class="badge lv" id="pLevel" style="display:none"></span>
      </div>
      <div class="email" id="pEmail"></div>
    </div>
  </div>
  <div class="row2">
    <label class="f"><span data-t="editNameLabel"></span><input type="text" id="editName"></label>
    <button class="ghost" id="saveName" data-t="saveBtn"></button>
  </div>
  <div class="row2">
    <label class="f"><span data-t="editPhoneLabel"></span><input type="tel" id="editPhone" inputmode="tel" maxlength="20" placeholder="9123 4567"></label>
    <button class="ghost" id="savePhone" data-t="saveBtn"></button>
  </div>
  <p class="hint" data-t="phoneHint" style="margin-top:-6px"></p>
  <!-- 踢拳堂數餘額（買咗幾多、剩幾多、到期） -->
  <div class="features" id="pkgBox" style="display:none">
    <h3 data-t="pkgTitle"></h3>
    <div id="pkgList"></div>
  </div>
  <div class="features">
    <h3 data-t="featTitle"></h3>
    <div id="featList"></div>
  </div>
  <!-- 訂閱方案（Stripe）：Holder 免費 → Pro / Max -->
  <div class="features" id="planBox" style="display:none">
    <h3 data-t="planTitle"></h3>
    <div class="feat" id="rowPro" style="display:none">
      <span data-t="planProDesc"></span><a href="#" id="upPro" data-t="upPro"></a>
    </div>
    <div class="feat" id="rowMax" style="display:none">
      <span data-t="planMaxDesc"></span><a href="#" id="upMax" data-t="upMax"></a>
    </div>
    <div class="feat" id="rowManage" style="display:none">
      <span data-t="planManageDesc"></span><a href="#" id="manageSub" data-t="manageSub"></a>
    </div>
    <p class="hint" data-t="planHint" style="margin-top:8px"></p>
  </div>
  <div class="msg" id="profMsg"></div>
  <button class="ghost" id="logout" data-t="logoutBtn" style="margin-top:14px"></button>
</div>

<!-- admin 用戶管理 -->
<div class="card" id="adminCard" style="display:none">
  <h2 data-t="adminTitle"></h2>
  <p class="hint" data-t="adminHint"></p>
  <div id="userList"><div class="spin" data-t="loading"></div></div>
</div>

<!-- admin 網站查詢 -->
<div class="card" id="enquiryCard" style="display:none">
  <h2 data-t="enqTitle"></h2>
  <p class="hint" data-t="enqHint"></p>
  <div id="enqList"><div class="spin" data-t="loading"></div></div>
</div>

<div class="foot">
  <span data-t="footNote"></span><br>
  <a href="/" data-t="backHome"></a>
</div>

let lang = "zh";
try { lang = localStorage.getItem("kf-lang") || "zh"; } catch (e) {}
if (!I18N[lang]) lang = "zh";
const t = (k, vars) => {
  const dict = I18N[lang] || I18N.zh;
  let s = dict[k] ?? I18N.zh[k] ?? k;
  if (vars) for (const [kk, vv] of Object.entries(vars)) s = s.replaceAll("{"+kk+"}", vv);
  return s;
};
const roleName = r => (I18N[lang] || I18N.zh).roleNames[r] || r;

/* ================= state ================= */
const FEATURES = [
  // Motion Lab 個頁本身公開（主頁 showcase）；雲端拳手檔案／訓練紀錄喺 app 入面先要登入
  { zh:"Motion Lab 動作分析", en:"Motion Lab — motion analysis", url:"/motion-lab/", roles:["member","student","coach","admin"] },
  { zh:"排堂報名", en:"Class booking", url:"/schedule/", roles:["member","student","coach","admin"] },
  { zh:"分成計算器（財務）", en:"Profit-split calculator (finance)", url:"/split-calculator/", roles:["coach","admin"] },
];
const $ = s => document.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
let sb=null, user=null, profile=null, mode="login", view="auth", lastSignupEmail="";

function msg(el, text, cls){ el.className="msg "+cls; el.textContent=text; }
function clearMsg(el){ el.className="msg"; el.textContent=""; }

function friendlyError(error){
  const m = (error && error.message || "").toLowerCase();
  if (m.includes("invalid login credentials")) return t("errInvalidLogin");
  if (m.includes("not confirmed")) return t("errNotConfirmed");
  if (m.includes("already registered") || m.includes("already been registered")) return t("errExists");
  if (m.includes("once every")) {
    const secs = (m.match(/(\d+)\s*seconds?/) || [])[1] || "60";
    return t("errCooldown", { secs });
  }
  if (m.includes("rate limit") || (error && error.status === 429)) return t("errRateLimit");
  if (m.includes("at least 6")) return t("errWeakPass");
  return t("errGeneric") + (error && error.message || t("errUnknown"));
}

function applyStatic(){
  document.querySelectorAll("[data-t]").forEach(el => { el.textContent = t(el.getAttribute("data-t")); });
  $("#langZh").classList.toggle("on", lang==="zh");
  $("#langEn").classList.toggle("on", lang==="en");
  $("#submitBtn").textContent = mode==="signup" ? t("signupBtn") : t("loginBtn");
  document.documentElement.lang = lang==="zh" ? "zh-Hant-HK" : "en";
  updateStatus();
}
function updateStatus(){
  const bar = $("#statusBar");
  if (view==="checkmail") bar.textContent = t("statusCheckMail");
  else if (view==="forgot") bar.textContent = t("statusForgot");
  else if (view==="recovery") bar.textContent = t("statusRecovery");
  else if (mode==="signup") bar.textContent = t("statusSignup");
  else bar.textContent = t("statusLoginTitle") + " " + t("statusLogin");
}
function showView(v){
  view = v;
  $("#viewAuth").style.display = v==="auth" ? "" : "none";
  $("#viewCheckMail").style.display = v==="checkmail" ? "" : "none";
  $("#viewForgot").style.display = v==="forgot" ? "" : "none";
  $("#viewRecovery").style.display = v==="recovery" ? "" : "none";
  clearMsg($("#authMsg"));
  updateStatus();
}

let bootFailed = false;
function showBootFail(){
  const box = $("#loading");
  box.style.display = "";
  $("#authCard").style.display = "none";
  $("#profileCard").style.display = "none";
  $("#adminCard").style.display = "none";
  $("#enquiryCard").style.display = "none";
  box.innerHTML = '<div class="spin">' + esc(t("bootFail")) + '</div><button class="ghost" id="bootReload">' + esc(t("reloadBtn")) + "</button>";
  box.querySelector("#bootReload").onclick = ()=>location.reload();
}

async function render(){
  if (bootFailed) { showBootFail(); return; }
  $("#loading").style.display = "none";
  applyStatic();
  if(!user){
    profile = null;
    $("#authCard").style.display = "";
    $("#profileCard").style.display = "none";
    $("#adminCard").style.display = "none";
    $("#enquiryCard").style.display = "none";
    return;
  }
  if (view === "recovery") { $("#authCard").style.display = ""; $("#profileCard").style.display = "none"; $("#adminCard").style.display = "none"; $("#enquiryCard").style.display = "none"; return; }
  $("#authCard").style.display = "none";
  $("#profileCard").style.display = "";
  const { data } = await sb.from("profiles").select("*").eq("id", user.id).single();
  profile = data || { role:"member", name:"", email:user.email };
  const role = profile.role || "member";
  $("#statusIn").innerHTML = esc(t("statusIn")) + "<b>" + esc(roleName(role)) + "</b>";
  $("#pName").textContent = profile.name || (user.email||"").split("@")[0];
  $("#pEmail").textContent = user.email || "";
  $("#editName").value = profile.name || "";
  // 顯示已儲存嘅 WhatsApp 號碼（去咗 852 前綴方便睇）
  $("#editPhone").value = (profile.phone || "").replace(/^852(?=\d{8}$)/, "");
  $("#avatar").textContent = (profile.name || user.email || "?").trim().charAt(0).toUpperCase();
  const badge = $("#pRole");
  badge.textContent = roleName(role);
  badge.className = "badge " + role;
  // 訂閱 plan badge + 堂數 level badge（my_tiers RPC；攞唔到就靜靜哋唔顯示）
  (async ()=>{
    try{
      const { data: tiers } = await sb.rpc("my_tiers");
      if(!tiers) return;
      const dict = I18N[lang] || I18N.zh;
      // 免費 plan 唔顯示 badge（「Holder」呢個名留返俾主理人身份用）；Pro/Max 先顯示
      const pp = $("#pPlan");
      if(tiers.plan === "pro" || tiers.plan === "max"){
        pp.textContent = dict.planNames[tiers.plan] || tiers.plan;
        pp.className = "badge " + tiers.plan;
        pp.style.display = "";
      } else { pp.style.display = "none"; }
      // level = 學員買咗邊種堂數（新星4堂/挑戰者8堂/苦行僧1對1）；未買過 → 唔顯示
      const pl = $("#pLevel");
      if(tiers.level){
        pl.textContent = dict.levelNames[tiers.level] || tiers.level;
        pl.className = "badge lv";
        pl.style.display = "";
      } else { pl.style.display = "none"; }
      renderPlanBox(tiers.plan);
    }catch(e){}
  })();
  renderPackages();
  $("#featList").innerHTML = FEATURES.map(f=>{
    const ok = f.roles.includes(role);
    return `<div class="feat ${ok?"":"locked"}">
      <span>${esc(lang==="zh"?f.zh:f.en)}<div class="need">${esc(t("needs"))}${f.roles.map(roleName).join(" / ")}</div></span>
      ${ok ? `<a href="${f.url}">${esc(t("open"))}</a>` : "<span>🔒</span>"}
    </div>`;
  }).join("");
  const next = new URLSearchParams(location.search).get("next");
  if(next && next.startsWith("/") && !next.startsWith("//") && !next.startsWith("/\\")){
    const feat = FEATURES.find(f=>next.startsWith(f.url));
    if(!feat || feat.roles.includes(role)){ location.replace(next); return; }
    msg($("#profMsg"), t("nextNoRole", { next, roles: feat.roles.map(roleName).join(" / "), role: roleName(role) }), "info");
  }
  // 由確認電郵條 link 返嚟（?welcome=1）：話聲註冊完成，帶返去主頁
  if(new URLSearchParams(location.search).get("welcome") === "1"){
    history.replaceState(null, "", location.pathname);
    msg($("#profMsg"), t("welcomeDone"), "ok");
    setTimeout(()=>location.replace("/"), 1600);
  }
  if(role==="admin"){ renderAdmin(); renderEnquiries(); }
  else { $("#adminCard").style.display="none"; $("#enquiryCard").style.display="none"; }
}

/* 踢拳堂數餘額（學員睇自己買咗幾多、剩幾多、到期） */
async function renderPackages(){
  const box = $("#pkgBox"), list = $("#pkgList");
  try{
    const { data, error } = await sb.rpc("my_packages");
    if(error || !data || !data.length){ box.style.display = "none"; return; }
    const dict = I18N[lang] || I18N.zh;
    list.innerHTML = data.map(p=>{
      const nm = dict.levelNames[p.package] || p.package;
      const exp = p.expired
        ? `<span style="color:var(--muted)">${esc(t("pkgExpired"))}</span>`
        : `${esc(t("pkgExpires"))}${esc(p.expires_at)}`;
      const low = !p.expired && p.remaining <= 1;
      return `<div class="feat">
        <span>${esc(nm)}<div class="need">${exp}</div></span>
        <b style="${p.expired?"color:var(--muted);text-decoration:line-through":low?"color:var(--accent)":""}">${p.remaining}/${p.sessions} ${esc(t("pkgLeft"))}</b>
      </div>`;
    }).join("");
    box.style.display = "";
  }catch(e){ box.style.display = "none"; }
}

let _entLib = null;
async function entLib(){
  if(_entLib) return _entLib;
  const { Entitlements } = await import("/assets/entitlements.js");
  _entLib = await Entitlements.init();
  return _entLib;
}
function renderPlanBox(plan){
  $("#planBox").style.display = "";
  $("#rowPro").style.display = plan==="holder" ? "" : "none";
  $("#rowMax").style.display = plan!=="max" ? "" : "none";
  $("#rowManage").style.display = plan!=="holder" ? "" : "none";
  $("#upPro").onclick = async e=>{ e.preventDefault(); (await entLib()).upgrade("all","pro"); };
  $("#upMax").onclick = async e=>{ e.preventDefault(); (await entLib()).upgrade("all","max"); };
  $("#manageSub").onclick = async e=>{ e.preventDefault(); (await entLib()).manage(); };
  // 由 Stripe Checkout 返嚟（?upgraded=1）：等 webhook 寫好 entitlement 就 reload 更新 badge
  if(new URLSearchParams(location.search).get("upgraded")==="1"){
    entLib().then(ent=>ent.on("change", ()=>location.reload()));
  }
}

      else { sel.style.outline = "2px solid var(--line-strong)"; setTimeout(()=>sel.style.outline="",1200); }
      sel.value = "";
    });
  });
}

// 外洩密碼檢查（HaveIBeenPwned k-anonymity）：只送出 SHA-1 頭 5 個字元，
// 密碼本身唔會離開瀏覽器。查唔到（網絡／API 問題）就放行，唔好窒礙註冊。
// （Supabase 內置版要 Pro plan；呢個免費做到同樣保護。）
async function isLeakedPassword(pw){
  try{
    const buf = await crypto.subtle.digest("SHA-1", new TextEncoder().encode(pw));
    const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("").toUpperCase();
    const res = await fetch("https://api.pwnedpasswords.com/range/" + hex.slice(0,5), {
      headers: { "Add-Padding": "true" },   // 回應加 padding，連 prefix 群組大小都唔洩露
    });
    if(!res.ok) return false;
    const suffix = hex.slice(5);
    return (await res.text()).split("\n").some(line=>{
      const [suf, count] = line.trim().split(":");
      return suf === suffix && parseInt(count, 10) > 0;
    });
  }catch(e){ return false; }
}

$("#submitBtn").onclick = async ()=>{
  const email = $("#email").value.trim(), password = $("#password").value;
  const box = $("#authMsg");
  if(!email || password.length < 6){ msg(box, t("fillEmailPass"), "err"); return; }
  $("#submitBtn").disabled = true;
  try{
    if(mode==="signup"){
      if(await isLeakedPassword(password)){ msg(box, t("passLeaked"), "err"); return; }
      const name = $("#name").value.trim();
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { name }, emailRedirectTo: location.origin + "/login/?welcome=1" }
      });
      if(error){ msg(box, friendlyError(error), "err"); return; }
      if(data.session){ return; } // 唔使確認電郵嘅情況：已直接登入
      // Supabase 對已註冊電郵回傳「假成功」（identities 空）做私隱保護 — 唔會寄信
      if(data.user && Array.isArray(data.user.identities) && data.user.identities.length === 0){
        setMode("login");
        msg(box, t("errExists"), "err");
        return;
      }
      lastSignupEmail = email;
      $("#sentTo").textContent = email;
      showView("checkmail");
      msg($("#authMsg"), t("signupOk"), "ok");
      startResendCooldown(60);   // 同一封確認信 60 秒內唔俾再寄，避免撞 429
    }else{
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error){
        if((error.message||"").toLowerCase().includes("not confirmed")){
          // 帶用戶返去第2步畫面，度度有「寄多次確認信」掣
          lastSignupEmail = email;
          $("#sentTo").textContent = email;
          showView("checkmail");
          msg(box, t("errNotConfirmed"), "err");
          return;
        }
        msg(box, friendlyError(error), "err"); return;
      }
    }
  } finally { $("#submitBtn").disabled = false; }
};
$("#password").addEventListener("keydown", e=>{ if(e.key==="Enter") $("#submitBtn").click(); });

// 確認信重寄冷卻：GoTrue 對同一地址有 per-request 冷卻（同埋內置電郵服務有每小時上限），
// 客戶端封住個掣做倒數，避免用戶連撳撞 429。語言切換時 applyStatic 會蓋走個 label，
// 倒數 tick（每秒）會即刻補返，所以照樣顯示。
let resendTimer = null, resendLeft = 0;
function startResendCooldown(secs){
  const btn = $("#resendBtn");
  if(!btn) return;
  clearInterval(resendTimer);
  resendLeft = secs;
  btn.disabled = true;
  btn.textContent = t("resendWait", { secs: resendLeft });
  resendTimer = setInterval(()=>{
    resendLeft--;
    if(resendLeft <= 0){ clearInterval(resendTimer); resendTimer = null; btn.disabled = false; btn.textContent = t("resendBtn"); }
    else btn.textContent = t("resendWait", { secs: resendLeft });
  }, 1000);
}
$("#resendBtn").onclick = async ()=>{
  if(resendLeft > 0) return;
  const box = $("#authMsg");
  const { error } = await sb.auth.resend({ type:"signup", email: lastSignupEmail, options:{ emailRedirectTo: location.origin + "/login/?welcome=1" } });
  if(error){ msg(box, friendlyError(error), "err"); return; }
  msg(box, t("resendOk"), "ok");
  startResendCooldown(60);
};

$("#sendResetBtn").onclick = async ()=>{
  const email = $("#forgotEmail").value.trim();
  const box = $("#authMsg");
  if(!email){ msg(box, t("fillEmail"), "err"); return; }
  $("#sendResetBtn").disabled = true;
  try{
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + "/login/" });
    if(error){ msg(box, friendlyError(error), "err"); return; }
    msg(box, t("resetSent", { email }), "ok");
  } finally { $("#sendResetBtn").disabled = false; }
};

$("#setPassBtn").onclick = async ()=>{
  const box = $("#authMsg");
  const pw = $("#newPassword").value;
  if(pw.length < 6){ msg(box, t("passTooShort"), "err"); return; }
  $("#setPassBtn").disabled = true;
  const leaked = await isLeakedPassword(pw);
  $("#setPassBtn").disabled = false;
  if(leaked){ msg(box, t("passLeaked"), "err"); return; }
  const { error } = await sb.auth.updateUser({ password: pw });
  if(error){ msg(box, friendlyError(error), "err"); return; }
  showView("auth");
  await render();
  msg($("#profMsg"), t("passUpdated"), "ok");
};

$("#saveName").onclick = async ()=>{
  const name = $("#editName").value.trim();
  const { error } = await sb.from("profiles").update({ name }).eq("id", user.id);
  const box = $("#profMsg");
  if(error){ msg(box, t("saveFail")+error.message, "err"); return; }
  msg(box, t("saved"), "ok"); render();
};
$("#savePhone").onclick = async ()=>{
  const box = $("#profMsg");
  // 標準化做「純數字＋國家碼」：8523xxxxxxx；容許 +852 / 852 / 淨 8 位
  let raw = $("#editPhone").value.replace(/[^0-9]/g, "");
  let phone = "";
  if(raw){
    if(/^\d{8}$/.test(raw)) phone = "852" + raw;
    else if(/^852\d{8}$/.test(raw)) phone = raw;
    else { msg(box, t("phoneBad"), "err"); return; }
  }
  const { error } = await sb.from("profiles").update({ phone: phone || null }).eq("id", user.id);
  if(error){
    msg(box, /duplicate|unique/i.test(error.message) ? t("phoneTaken") : t("saveFail")+error.message, "err");
    return;
  }
  msg(box, t("saved"), "ok"); render();
};
$("#logout").onclick = async ()=>{ await sb.auth.signOut(); showView("auth"); setMode("login"); };

/* ================= boot ================= */
applyStatic();
try{
  const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
  sb = createClient(SB_URL, SB_KEY);
  sb.auth.onAuthStateChange((event, session)=>{
    user = session?.user || null;
    if(event === "PASSWORD_RECOVERY"){ showView("recovery"); render(); return; }
    if(event === "SIGNED_OUT"){ showView("auth"); setMode("login"); }
    render();
  });
  user = (await sb.auth.getSession()).data.session?.user || null;
  render();
  // 過期／用過嘅電郵連結：GoTrue 會經 #error_code=otp_expired 呢類 param 彈返嚟 — 要話返俾用戶知
  const hashParams = new URLSearchParams(location.hash.replace(/^#/, ""));
  const errCode = hashParams.get("error_code") || new URLSearchParams(location.search).get("error_code");
  if(errCode){
    const desc = hashParams.get("error_description") || "";
    msg($("#authMsg"), /expired|otp/i.test(errCode + desc) ? t("errLinkExpired") : t("errGeneric") + (desc || errCode), "err");
    history.replaceState(null, "", location.pathname + location.search);
  }
}catch(e){
  console.warn("boot failed", e);
  bootFailed = true;
  showBootFail();
}
</script>
